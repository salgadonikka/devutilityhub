name: Deploy Frontend to Cloudflare Pages

#on:
#  push:
#    branches: [ main ]
#    paths:
#      - 'frontend/**'          # only runs when frontend changes

on: workflow_dispatch # allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/dev-utility-hub-ui/package-lock.json

      - name: Install dependencies
        working-directory: frontend/dev-utility-hub-ui
        run: npm ci

      - name: Build
        working-directory: frontend/dev-utility-hub-ui
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PAGES_PROJECT_NAME }}
          directory: frontend/dev-utility-hub-ui/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
